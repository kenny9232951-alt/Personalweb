<!-- 
  貼上說明：
  1. 去 formspree.io 註冊並建立 Form
  2. 把下方 action="https://formspree.io/f/YOUR_FORM_ID" 的 YOUR_FORM_ID 換成你的 ID
  3. 把這整段貼到 index.html 的 .ct-right div 裡面，放在 .info-rows 的下方
-->

<style>
/* Contact Form */
.ct-form{margin-top:32px;}
.ct-form-label{font-family:var(--ff-h);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--teal);margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.ct-form-label::before{content:'';width:16px;height:1px;background:var(--teal);}
.cf-input{
  width:100%;padding:12px 16px;
  background:rgba(255,255,255,0.04);
  border:0.5px solid var(--border);
  color:var(--white);font-family:var(--ff-b);font-size:14px;
  outline:none;transition:border-color 0.2s;margin-bottom:16px;
  display:block;
}
.cf-input:focus{border-color:var(--teal);}
.cf-input::placeholder{color:var(--gray);}
.cf-type-label{font-family:var(--ff-h);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:10px;display:block;}
.cf-types{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.cf-type-btn{
  padding:7px 16px;
  border:0.5px solid var(--border);
  background:transparent;color:var(--gray);
  font-family:var(--ff-h);font-size:10px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;
  cursor:pointer;transition:all 0.2s;
}
.cf-type-btn.selected{background:var(--teal);color:var(--bg);border-color:var(--teal);}
.cf-textarea{
  width:100%;padding:12px 16px;min-height:100px;resize:vertical;
  background:rgba(255,255,255,0.04);
  border:0.5px solid var(--border);
  color:var(--white);font-family:var(--ff-b);font-size:14px;
  outline:none;transition:border-color 0.2s;margin-bottom:16px;
  display:block;
}
.cf-textarea:focus{border-color:var(--teal);}
.cf-textarea::placeholder{color:var(--gray);}
.cf-submit{
  width:100%;padding:14px;
  background:var(--teal);color:var(--bg);
  font-family:var(--ff-h);font-size:11px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  border:none;cursor:pointer;transition:background 0.2s;
}
.cf-submit:hover{background:var(--teal-dark);}
.cf-submit:disabled{background:rgba(45,212,191,0.3);cursor:not-allowed;}
.cf-success{
  display:none;padding:16px;
  border:0.5px solid var(--border-t);
  background:rgba(45,212,191,0.08);
  font-family:var(--ff-h);font-size:11px;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--teal);text-align:center;
  margin-top:12px;
}
</style>

<!-- 把這段貼到 .ct-right div 裡，放在 .info-rows 下方 -->
<div class="ct-form">
  <div class="ct-form-label t"
    data-zh="快速聯絡"
    data-en="Quick Contact"
    data-vi="Liên hệ nhanh">快速聯絡</div>

  <form id="contact-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">

    <!-- Email -->
    <input
      class="cf-input"
      type="email"
      name="email"
      placeholder="你的 Email / Your Email"
      required>

    <!-- 合作類型（複選） -->
    <span class="cf-type-label t"
      data-zh="合作類型（可複選）"
      data-en="Type of Collaboration"
      data-vi="Loại hợp tác">合作類型（可複選）</span>

    <div class="cf-types">
      <button type="button" class="cf-type-btn t"
        data-zh="演講邀約" data-en="Speaking" data-vi="Diễn thuyết"
        onclick="toggleType(this,'演講邀約')">演講邀約</button>
      <button type="button" class="cf-type-btn t"
        data-zh="工作機會" data-en="Job Opportunity" data-vi="Việc làm"
        onclick="toggleType(this,'工作機會')">工作機會</button>
      <button type="button" class="cf-type-btn t"
        data-zh="其他合作" data-en="Other" data-vi="Khác"
        onclick="toggleType(this,'其他合作')">其他合作</button>
    </div>

    <!-- 隱藏欄位儲存選擇的合作類型 -->
    <input type="hidden" name="合作類型" id="collab-types" value="">

    <!-- 留言 -->
    <textarea
      class="cf-textarea"
      name="message"
      placeholder="想說的話 / Your message..."
      required></textarea>

    <button type="submit" class="cf-submit t"
      data-zh="送出 →"
      data-en="Submit →"
      data-vi="Gửi →">送出 →</button>

  </form>

  <div class="cf-success" id="cf-success">
    ✦ 已收到！我會盡快回覆你。
  </div>
</div>

<script>
/* 合作類型複選 */
function toggleType(btn, label) {
  btn.classList.toggle('selected');
  const selected = [...document.querySelectorAll('.cf-type-btn.selected')]
    .map(b => b.getAttribute('data-zh') || b.textContent.trim());
  document.getElementById('collab-types').value = selected.join(', ');
}

/* 表單送出 */
document.getElementById('contact-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = this.querySelector('.cf-submit');
  btn.disabled = true;
  btn.textContent = '送出中...';

  const data = new FormData(this);
  const res = await fetch(this.action, {
    method: 'POST',
    body: data,
    headers: { 'Accept': 'application/json' }
  });

  if (res.ok) {
    this.style.display = 'none';
    document.getElementById('cf-success').style.display = 'block';
  } else {
    btn.disabled = false;
    btn.textContent = '送出失敗，請直接 Email 聯絡';
  }
});
</script>
